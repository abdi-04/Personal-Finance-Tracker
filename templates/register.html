<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Finance Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Create Account</h1>

        <form id="form" method="POST" action="/register" novalidate>
            <div class="field-row">
                <div class="field">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname">
                    <span class="error-msg" id="firstname-error"></span>
                </div>
                <div class="field">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname">
                    <span class="error-msg" id="lastname-error"></span>
                </div>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <span class="error-msg" id="email-error"></span>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
                <span class="error-msg" id="password-error"></span>
            </div>
            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password">
                <span class="error-msg" id="confirm-error"></span>
            </div>
            <button type="submit">Register</button>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <p>Already have an account? <a href="/">Login</a></p>
    </div>

    <script defer src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
