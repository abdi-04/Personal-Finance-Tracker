<section class="budget">
  <h2>Budget</h2>

  <div class="budget-form">
    <div>
      <label for="category">Category</label>
      <select id="category">
        <option value="">Select a category</option>
        {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="limit">Monthly Limit</label>
      <input type="number" id="limit" placeholder="0.00" min="0" step="0.01"/>
    </div>
    <div>
      <button id="save"><i class="fa-solid fa-circle-plus"></i></button>
    </div>
  </div>

  <hr>

  <table>
    <thead>
      <tr>
        <th>Category</th>
        <th>Budget</th>
        <th>Spent</th>
        <th>Remaining</th>
      </tr>
    </thead>
    <tbody id="tbody">
      {% for item in budget %}
      <tr data-id="{{ item.id }}">
        <td>{{ item.category_name }}</td>

        <td>{{ '%.2f' % item.budget_amount }}</td>

        <td>{{ '%.2f' % item.spent }}</td>

        <td>
          {{ '%.2f' % (item.budget_amount - item.spent) }}
        </td>

        <td>
          <button class="edit-budget">
            <i class="fa-regular fa-pen-to-square"></i>
          </button>
          <button class="delete-budget" data-id="{{ item.id }}">
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
